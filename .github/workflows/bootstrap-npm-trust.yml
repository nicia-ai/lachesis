name: Bootstrap npm trusted publishing

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  RELEASE_COMMIT: 478ab365d51feb7bb57cd056c8762b421efa3a1d
  RELEASE_VERSION: 0.1.0-alpha.1
  RELEASE_TAG: v0.1.0-alpha.1

jobs:
  trust:
    name: Bind published packages to release.yml
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_COMMIT }}
          fetch-depth: 0

      - name: Verify immutable release identity
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test -z "$(git status --porcelain)"
          remote_target="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG^{}" | cut -f1)"
          test "$remote_target" = "$RELEASE_COMMIT"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Require one-time bootstrap credential
        env:
          BOOTSTRAP_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: test -n "$BOOTSTRAP_NPM_TOKEN"

      - name: Install npm trust support
        run: npm install --global npm@11.16.0

      - name: Verify published package identities
        run: |
          for package_name in \
            @nicia-ai/lachesis \
            @nicia-ai/lachesis-evidence \
            @nicia-ai/lachesis-runtime \
            @nicia-ai/lachesis-evidence-typegraph \
            @nicia-ai/lachesis-generator
          do
            test "$(npm view "$package_name@$RELEASE_VERSION" version)" = "$RELEASE_VERSION"
            test "$(npm view "$package_name" dist-tags.alpha)" = "$RELEASE_VERSION"
          done

      - name: Configure token-free trusted publishing
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for package_name in \
            @nicia-ai/lachesis \
            @nicia-ai/lachesis-evidence \
            @nicia-ai/lachesis-runtime \
            @nicia-ai/lachesis-evidence-typegraph \
            @nicia-ai/lachesis-generator
          do
            npm trust github "$package_name" \
              --repo nicia-ai/lachesis \
              --file release.yml \
              --allow-publish \
              --yes
            npm trust list "$package_name" --json
          done
