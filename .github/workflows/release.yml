name: Release

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Exact audited source commit to publish
        required: true
        type: string

concurrency:
  group: release-alpha
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  RELEASE_COMMIT: ${{ inputs.release_commit }}
  RELEASE_VERSION: 0.1.0-alpha.3
  RELEASE_TAG: v0.1.0-alpha.3
  RELEASE_NOTES: docs/m7c-alpha3-release-notes.md
  RELEASE_CHECKSUMS: docs/m7c-alpha3-release.sha256

jobs:
  release:
    name: Publish audited public alpha
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Confirm immutable release authorization
        run: |
          test "${#RELEASE_COMMIT}" -eq 40
          test -z "$(printf '%s' "$RELEASE_COMMIT" | tr -d '0123456789abcdef')"
          test "$GITHUB_REF" = "refs/heads/main"

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_COMMIT }}
          fetch-depth: 0

      - name: Verify exact clean source
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test -z "$(git status --porcelain)"

      - name: Verify frozen release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remote_target="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG^{}" | cut -f1)"
          test "$remote_target" = "$RELEASE_COMMIT"
          test "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" = "false"
          test "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)" = "true"
          release_body="$(gh release view "$RELEASE_TAG" --json body --jq .body)"
          expected_body="$(cat "$RELEASE_NOTES")"
          test "$release_body" = "$expected_body"
          shasum -a 256 -c "$RELEASE_CHECKSUMS"

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Require npm trusted-publishing support
        run: |
          NPM_VERSION="$(npm --version)"
          export NPM_VERSION
          node - <<'NODE'
          const version = process.env.NPM_VERSION;
          if (version === undefined) throw new Error("npm version is unavailable");
          const [major, minor] = version.split(".").map(Number);
          if (major < 11 || (major === 11 && minor < 15)) {
            throw new Error(`npm 11.15.0 or newer is required; found ${version}`);
          }
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frozen release verification
        run: |
          pnpm format:check
          pnpm build
          pnpm typecheck
          pnpm lint
          parity_passed=false
          for attempt in 1 2 3
          do
            if pnpm exec vitest run packages/evidence-typegraph/tests/parity.test.ts \
              --maxWorkers=1 \
              --testNamePattern='preserves compiler, visible-view, validation, and reconstruction identities'
            then
              parity_passed=true
              break
            fi
            echo "Parity timing gate did not complete on attempt $attempt" >&2
          done
          test "$parity_passed" = "true"
          pnpm exec vitest run packages/evidence-typegraph/tests/parity.test.ts \
            --maxWorkers=1 \
            --testNamePattern='^(?!.*preserves compiler, visible-view, validation, and reconstruction identities).*$'
          pnpm exec vitest run --maxWorkers=1 \
            --exclude=packages/evidence-typegraph/tests/parity.test.ts
          mkdir -p .vitest-reports
          cat > "$RUNNER_TEMP/vitest-release-shard.config.mjs" <<EOF
          import base from "${GITHUB_WORKSPACE}/vitest.config.ts";
          export default {
            ...base,
            test: {
              ...base.test,
              coverage: {
                ...base.test?.coverage,
                thresholds: { branches: 0, functions: 0, lines: 0, statements: 0 },
              },
            },
          };
          EOF
          pnpm exec vitest run packages/evidence-typegraph/tests/parity.test.ts \
            --maxWorkers=1 \
            --testNamePattern='^(?!.*preserves compiler, visible-view, validation, and reconstruction identities).*$' \
            --coverage \
            --coverage.reportsDirectory="$RUNNER_TEMP/coverage-parity-rest" \
            --config="$RUNNER_TEMP/vitest-release-shard.config.mjs" \
            --reporter=blob \
            --outputFile=.vitest-reports/parity-rest.json
          pnpm exec vitest run \
            --maxWorkers=1 \
            --exclude=packages/evidence-typegraph/tests/parity.test.ts \
            --coverage \
            --coverage.reportsDirectory="$RUNNER_TEMP/coverage-rest" \
            --config="$RUNNER_TEMP/vitest-release-shard.config.mjs" \
            --reporter=blob \
            --outputFile=.vitest-reports/rest.json
          pnpm exec vitest run --merge-reports=.vitest-reports --coverage
          pnpm build
          pnpm smoke
          pnpm test:examples
          pnpm test:load
          pnpm audit:source-safety
          pnpm audit:public-api
          pnpm audit:release-checksums
          mkdir -p "$RUNNER_TEMP/lachesis-pack-audit-prefetch"
          cat > "$RUNNER_TEMP/lachesis-pack-audit-prefetch/package.json" <<'EOF'
          {
            "name": "lachesis-pack-audit-prefetch",
            "private": true,
            "packageManager": "pnpm@10.33.0",
            "dependencies": {
              "@babel/parser": "7.29.7",
              "@babel/types": "7.29.7",
              "@nicia-ai/typegraph": "0.38.0",
              "@types/node": "24.13.3",
              "better-sqlite3": "12.11.1",
              "typescript": "6.0.3",
              "wrangler": "4.110.0",
              "zod": "4.4.3"
            }
          }
          EOF
          pnpm --dir "$RUNNER_TEMP/lachesis-pack-audit-prefetch" install \
            --ignore-scripts \
            --lockfile=false
          pnpm audit:packages

      - name: Verify authorized package set
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const expected = new Map([
            ["packages/kernel/package.json", "@nicia-ai/lachesis"],
            ["packages/evidence/package.json", "@nicia-ai/lachesis-evidence"],
            ["packages/runtime/package.json", "@nicia-ai/lachesis-runtime"],
            ["packages/evidence-typegraph/package.json", "@nicia-ai/lachesis-evidence-typegraph"],
            ["packages/generator/package.json", "@nicia-ai/lachesis-generator"],
          ]);
          const publicPackages = new Map();
          for (const root of ["packages", "apps", "compat", "examples"]) {
            if (!fs.existsSync(root)) continue;
            for (const entry of fs.readdirSync(root)) {
              const manifestPath = path.join(root, entry, "package.json");
              if (!fs.existsSync(manifestPath)) continue;
              const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
              if (manifest.private !== true) publicPackages.set(manifestPath, manifest);
            }
          }
          if (publicPackages.size !== expected.size) {
            throw new Error(`Expected exactly ${expected.size} public packages; found ${publicPackages.size}`);
          }
          for (const [manifestPath, expectedName] of expected) {
            const manifest = publicPackages.get(manifestPath);
            if (
              manifest?.name !== expectedName ||
              manifest.version !== process.env.RELEASE_VERSION ||
              manifest.publishConfig?.access !== "public"
            ) {
              throw new Error(`Unauthorized package metadata at ${manifestPath}`);
            }
          }
          NODE

      - name: Check registry state
        id: registry
        run: |
          present=0
          absent=0
          for package_name in \
            @nicia-ai/lachesis \
            @nicia-ai/lachesis-evidence \
            @nicia-ai/lachesis-runtime \
            @nicia-ai/lachesis-evidence-typegraph \
            @nicia-ai/lachesis-generator
          do
            if npm view "$package_name@$RELEASE_VERSION" version >/dev/null 2>&1
            then
              present=$((present + 1))
            else
              absent=$((absent + 1))
            fi
          done
          if test "$present" -eq 0
          then
            echo "state=absent" >> "$GITHUB_OUTPUT"
          elif test "$absent" -eq 0
          then
            echo "state=present" >> "$GITHUB_OUTPUT"
          else
            echo "Refusing a partial release: $present versions exist and $absent are absent" >&2
            exit 1
          fi

      - name: Snapshot existing latest dist-tags
        run: |
          latest_snapshot="$RUNNER_TEMP/latest-dist-tags.tsv"
          : > "$latest_snapshot"
          for package_name in \
            @nicia-ai/lachesis \
            @nicia-ai/lachesis-evidence \
            @nicia-ai/lachesis-runtime \
            @nicia-ai/lachesis-evidence-typegraph \
            @nicia-ai/lachesis-generator
          do
            latest="$(npm view "$package_name" dist-tags.latest 2>/dev/null || true)"
            printf '%s\t%s\n' "$package_name" "$latest" >> "$latest_snapshot"
          done

      - name: Pack audited artifacts
        run: |
          node scripts/prepare-alpha3-tarballs.mjs --output-dir .release-packages
          shasum -a 256 -c docs/m7c-alpha3-tarballs.sha256

      - name: Publish public alpha
        if: steps.registry.outputs.state == 'absent'
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          npm publish ".release-packages/nicia-ai-lachesis-$RELEASE_VERSION.tgz" --tag alpha --access public
          npm publish ".release-packages/nicia-ai-lachesis-evidence-$RELEASE_VERSION.tgz" --tag alpha --access public
          npm publish ".release-packages/nicia-ai-lachesis-runtime-$RELEASE_VERSION.tgz" --tag alpha --access public
          npm publish ".release-packages/nicia-ai-lachesis-evidence-typegraph-$RELEASE_VERSION.tgz" --tag alpha --access public
          npm publish ".release-packages/nicia-ai-lachesis-generator-$RELEASE_VERSION.tgz" --tag alpha --access public

      - name: Verify alpha dist-tags
        run: |
          latest_snapshot="$RUNNER_TEMP/latest-dist-tags.tsv"
          for package_name in \
            @nicia-ai/lachesis \
            @nicia-ai/lachesis-evidence \
            @nicia-ai/lachesis-runtime \
            @nicia-ai/lachesis-evidence-typegraph \
            @nicia-ai/lachesis-generator
          do
            published=false
            for attempt in $(seq 1 24)
            do
              version="$(npm view "$package_name@$RELEASE_VERSION" version 2>/dev/null || true)"
              alpha="$(npm view "$package_name" dist-tags.alpha 2>/dev/null || true)"
              if test "$version" = "$RELEASE_VERSION" && test "$alpha" = "$RELEASE_VERSION"
              then
                published=true
                break
              fi
              echo "Waiting for $package_name registry visibility ($attempt/24)" >&2
              sleep 5
            done
            test "$published" = "true"
            latest="$(npm view "$package_name" dist-tags.latest 2>/dev/null || true)"
            expected_latest="$(awk -F '\t' -v name="$package_name" '$1 == name { print $2 }' "$latest_snapshot")"
            test "$latest" = "$expected_latest"
          done

      - name: Return release to draft on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"
          --draft=true
