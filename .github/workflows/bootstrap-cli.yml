name: Bootstrap Lachesis CLI

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Exact frozen alpha.4 package-source commit
        required: true
        type: string

concurrency:
  group: bootstrap-lachesis-cli-0.1.0-alpha.4
  cancel-in-progress: false

env:
  RELEASE_COMMIT: 635521f1d2e753095fca4fdbbafbf7ed2287efe1
  RELEASE_VERSION: 0.1.0-alpha.4
  RELEASE_TAG: v0.1.0-alpha.4
  RELEASE_TITLE: Lachesis 0.1.0-alpha.4
  DRAFT_RELEASE_ID: "359550250"
  RELEASE_NOTES: docs/m8b2b-alpha4-release-notes.md
  RELEASE_NOTES_SHA256: bec6a90f3c7683e3d66d10607ebfb4891105abb25064c5feae14e59196fc1a02
  RELEASE_CHECKSUMS: docs/m8b2b-alpha4-release.sha256
  CLI_TARBALL_SHA256: f9586fd9554fbe78fd88ab28400d2a04fe78792196d17f5d7f74558f33d3e638
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  verify-draft:
    name: Verify frozen draft release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      cli-tarball-sha256: ${{ steps.bind.outputs.cli-tarball-sha256 }}
      draft-release-id: ${{ steps.bind.outputs.draft-release-id }}
      registry-absence: ${{ steps.bind.outputs.registry-absence }}
      release-body-sha256: ${{ steps.bind.outputs.release-body-sha256 }}
      release-commit: ${{ steps.bind.outputs.release-commit }}
      release-tag: ${{ steps.bind.outputs.release-tag }}
    steps:
      - name: Validate immutable dispatch
        env:
          REQUESTED_COMMIT: ${{ inputs.release_commit }}
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          test "$REQUESTED_COMMIT" = "$RELEASE_COMMIT"
          test "${#REQUESTED_COMMIT}" -eq 40
          test -z "$(printf '%s' "$REQUESTED_COMMIT" | tr -d '0123456789abcdef')"

      - name: Check out bootstrap infrastructure
        uses: actions/checkout@v6
        with:
          path: bootstrap-infrastructure
          persist-credentials: false

      - name: Check out detached frozen package source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_COMMIT }}
          fetch-depth: 0
          path: release-source
          persist-credentials: false

      - name: Verify source, tag, draft prerelease, and checksums
        working-directory: release-source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test -z "$(git status --porcelain)"
          test "$(git cat-file -t "$RELEASE_TAG")" = "tag"
          test "$(git rev-parse "$RELEASE_TAG^{}")" = "$RELEASE_COMMIT"
          test "$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG^{}" | cut -f1)" = "$RELEASE_COMMIT"
          gh api \
            --method GET \
            "repos/$GITHUB_REPOSITORY/releases/$DRAFT_RELEASE_ID" \
            > "$RUNNER_TEMP/draft-release.json"
          node - "$RUNNER_TEMP/draft-release.json" "$RELEASE_NOTES" <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const [releasePath, notesPath] = process.argv.slice(2);
          const release = JSON.parse(fs.readFileSync(releasePath, "utf8"));
          const notes = fs.readFileSync(notesPath);
          if (release.id !== Number(process.env.DRAFT_RELEASE_ID)) {
            throw new Error("The GitHub draft release identity differs from the frozen identity.");
          }
          if (release.tag_name !== process.env.RELEASE_TAG) {
            throw new Error("The GitHub release tag differs from the frozen tag.");
          }
          if (release.draft !== true || release.prerelease !== true) {
            throw new Error("The GitHub release must remain a draft prerelease.");
          }
          if (release.name !== process.env.RELEASE_TITLE) {
            throw new Error("The GitHub release title differs from the frozen title.");
          }
          const releaseBody = Buffer.from(release.body, "utf8");
          const bodyDigest = crypto.createHash("sha256").update(releaseBody).digest("hex");
          if (bodyDigest !== process.env.RELEASE_NOTES_SHA256) {
            throw new Error("The GitHub release body digest differs from the frozen digest.");
          }
          if (!releaseBody.equals(notes)) {
            throw new Error("The GitHub release body differs from the frozen release-note bytes.");
          }
          NODE
          shasum -a 256 -c "$RELEASE_CHECKSUMS"

      - name: Require all six alpha.4 versions to be absent
        run: |
          node - <<'NODE'
          const packages = [
            "@nicia-ai/lachesis",
            "@nicia-ai/lachesis-evidence",
            "@nicia-ai/lachesis-generator",
            "@nicia-ai/lachesis-runtime",
            "@nicia-ai/lachesis-evidence-typegraph",
            "@nicia-ai/lachesis-cli",
          ];
          for (const packageName of packages) {
            const encoded = encodeURIComponent(packageName).replace("%40", "@");
            const response = await fetch(
              `${process.env.NPM_REGISTRY}/${encoded}/${process.env.RELEASE_VERSION}`,
              {
                headers: { accept: "application/json" },
                redirect: "error",
              },
            );
            await response.arrayBuffer();
            if (response.status !== 404) {
              throw new Error(
                `${packageName}@${process.env.RELEASE_VERSION} absence check returned HTTP ${response.status}`,
              );
            }
          }
          const cliResponse = await fetch(
            `${process.env.NPM_REGISTRY}/@nicia-ai%2Flachesis-cli`,
            {
              headers: { accept: "application/json" },
              redirect: "error",
            },
          );
          await cliResponse.arrayBuffer();
          if (cliResponse.status !== 404) {
            throw new Error(
              `First-publication CLI package check returned HTTP ${cliResponse.status}`,
            );
          }
          NODE

      - name: Bind verified public identities
        id: bind
        run: |
          {
            echo "cli-tarball-sha256=$CLI_TARBALL_SHA256"
            echo "draft-release-id=$DRAFT_RELEASE_ID"
            echo "registry-absence=alpha4-absent-all-six"
            echo "release-body-sha256=$RELEASE_NOTES_SHA256"
            echo "release-commit=$RELEASE_COMMIT"
            echo "release-tag=$RELEASE_TAG"
          } >> "$GITHUB_OUTPUT"

  bootstrap-cli:
    name: Publish first CLI version only
    needs: verify-draft
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate immutable dispatch
        env:
          VERIFIED_CLI_TARBALL_SHA256:
            ${{ needs.verify-draft.outputs.cli-tarball-sha256 }}
          VERIFIED_DRAFT_RELEASE_ID:
            ${{ needs.verify-draft.outputs.draft-release-id }}
          VERIFIED_REGISTRY_ABSENCE:
            ${{ needs.verify-draft.outputs.registry-absence }}
          VERIFIED_RELEASE_BODY_SHA256:
            ${{ needs.verify-draft.outputs.release-body-sha256 }}
          VERIFIED_RELEASE_COMMIT:
            ${{ needs.verify-draft.outputs.release-commit }}
          VERIFIED_RELEASE_TAG: ${{ needs.verify-draft.outputs.release-tag }}
          REQUESTED_COMMIT: ${{ inputs.release_commit }}
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          test "$REQUESTED_COMMIT" = "$RELEASE_COMMIT"
          test "${#REQUESTED_COMMIT}" -eq 40
          test -z "$(printf '%s' "$REQUESTED_COMMIT" | tr -d '0123456789abcdef')"
          test "$VERIFIED_CLI_TARBALL_SHA256" = "$CLI_TARBALL_SHA256"
          test "$VERIFIED_DRAFT_RELEASE_ID" = "$DRAFT_RELEASE_ID"
          test "$VERIFIED_REGISTRY_ABSENCE" = "alpha4-absent-all-six"
          test "$VERIFIED_RELEASE_BODY_SHA256" = "$RELEASE_NOTES_SHA256"
          test "$VERIFIED_RELEASE_COMMIT" = "$RELEASE_COMMIT"
          test "$VERIFIED_RELEASE_TAG" = "$RELEASE_TAG"

      - name: Check out bootstrap infrastructure
        uses: actions/checkout@v6
        with:
          path: bootstrap-infrastructure
          persist-credentials: false

      - name: Check out detached frozen package source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_COMMIT }}
          fetch-depth: 0
          path: release-source
          persist-credentials: false

      - name: Verify source, tag, and checksums
        working-directory: release-source
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test -z "$(git status --porcelain)"
          test "$(git cat-file -t "$RELEASE_TAG")" = "tag"
          test "$(git rev-parse "$RELEASE_TAG^{}")" = "$RELEASE_COMMIT"
          test "$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG^{}" | cut -f1)" = "$RELEASE_COMMIT"
          shasum -a 256 -c "$RELEASE_CHECKSUMS"

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: release-source/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Require provenance-capable npm
        run: |
          npm_version="$(npm --version)"
          export npm_version
          node - <<'NODE'
          const [major, minor, patch] = process.env.npm_version.split(".").map(Number);
          if (
            major < 11 ||
            (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))
          ) {
            throw new Error(`npm 11.5.1 or newer is required; found ${process.env.npm_version}`);
          }
          NODE

      - name: Install and build frozen sources
        working-directory: release-source
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @nicia-ai/lachesis build
          pnpm --filter @nicia-ai/lachesis-evidence build
          pnpm --filter @nicia-ai/lachesis-generator build
          pnpm --filter @nicia-ai/lachesis-runtime build
          pnpm --filter @nicia-ai/lachesis-evidence-typegraph build
          pnpm --filter @nicia-ai/lachesis-cli build

      - name: Verify the exact public package allowlist
        env:
          LACHESIS_JSON_MODULE:
            ${{ github.workspace }}/release-source/packages/kernel/dist/json.js
        run: |
          node bootstrap-infrastructure/scripts/verify-cli-bootstrap.mjs \
            package-set release-source

      - name: Reproduce and verify the CLI tarball
        working-directory: release-source
        run: |
          for attempt in 1 2 3
          do
            output="$RUNNER_TEMP/cli-pack-$attempt"
            node scripts/prepare-alpha4-tarballs.mjs --output-dir "$output"
            digest="$(shasum -a 256 "$output/nicia-ai-lachesis-cli-$RELEASE_VERSION.tgz" | cut -d ' ' -f1)"
            test "$digest" = "$CLI_TARBALL_SHA256"
          done
          mkdir "$RUNNER_TEMP/cli-publish"
          cp "$RUNNER_TEMP/cli-pack-1/nicia-ai-lachesis-cli-$RELEASE_VERSION.tgz" \
            "$RUNNER_TEMP/cli-publish/"
          test "$(find "$RUNNER_TEMP/cli-publish" -type f | wc -l | tr -d ' ')" = "1"

      - name: Require all six alpha.4 versions to be absent
        env:
          LACHESIS_JSON_MODULE:
            ${{ github.workspace }}/release-source/packages/kernel/dist/json.js
        run: |
          node bootstrap-infrastructure/scripts/verify-cli-bootstrap.mjs \
            registry-snapshot "$NPM_REGISTRY" \
            > "$RUNNER_TEMP/pre-bootstrap-registry.json"

      - name: Publish exactly the first CLI version
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          test -n "$NPM_TOKEN"
          set +x
          NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish \
            "$RUNNER_TEMP/cli-publish/nicia-ai-lachesis-cli-$RELEASE_VERSION.tgz" \
            --ignore-scripts \
            --tag alpha \
            --access public \
            --provenance
          unset NPM_TOKEN

      - name: Verify the sole registry mutation
        env:
          LACHESIS_JSON_MODULE:
            ${{ github.workspace }}/release-source/packages/kernel/dist/json.js
        run: |
          verified=false
          for attempt in $(seq 1 24)
          do
            if node bootstrap-infrastructure/scripts/verify-cli-bootstrap.mjs \
              registry-result "$NPM_REGISTRY" "$RELEASE_COMMIT" "$GITHUB_SHA" \
              > "$RUNNER_TEMP/cli-bootstrap-verification.json"
            then
              verified=true
              break
            fi
            echo "Waiting for CLI registry verification ($attempt/24)" >&2
            sleep 5
          done
          test "$verified" = "true"
          node bootstrap-infrastructure/scripts/verify-cli-bootstrap.mjs \
            registry-unchanged "$NPM_REGISTRY" \
            "$RUNNER_TEMP/pre-bootstrap-registry.json"
          cat "$RUNNER_TEMP/cli-bootstrap-verification.json" >> "$GITHUB_STEP_SUMMARY"
