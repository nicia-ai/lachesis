name: Release

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Exact audited source commit to publish
        required: true
        type: string

concurrency:
  group: release-alpha
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  RELEASE_COMMIT: ${{ inputs.release_commit }}
  RELEASE_VERSION: 0.1.0-alpha.4
  RELEASE_TAG: v0.1.0-alpha.4
  RELEASE_NOTES: docs/m8b2b-alpha4-release-notes.md
  RELEASE_CHECKSUMS: docs/m8b2b-alpha4-release.sha256

jobs:
  release:
    name: Publish audited public alpha
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Confirm immutable release authorization
        run: |
          test "${#RELEASE_COMMIT}" -eq 40
          test -z "$(printf '%s' "$RELEASE_COMMIT" | tr -d '0123456789abcdef')"
          test "$GITHUB_REF" = "refs/heads/main"

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_COMMIT }}
          fetch-depth: 0

      - name: Verify exact clean source
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test -z "$(git status --porcelain)"

      - name: Verify frozen release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remote_target="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG^{}" | cut -f1)"
          test "$remote_target" = "$RELEASE_COMMIT"
          test "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" = "false"
          test "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)" = "true"
          release_body="$(gh release view "$RELEASE_TAG" --json body --jq .body)"
          expected_body="$(cat "$RELEASE_NOTES")"
          test "$release_body" = "$expected_body"
          shasum -a 256 -c "$RELEASE_CHECKSUMS"

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Require npm trusted-publishing support
        run: |
          NPM_VERSION="$(npm --version)"
          export NPM_VERSION
          node - <<'NODE'
          const version = process.env.NPM_VERSION;
          if (version === undefined) throw new Error("npm version is unavailable");
          const [major, minor, patch] = version.split(".").map(Number);
          if (
            major < 11 ||
            (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))
          ) {
            throw new Error(`npm 11.5.1 or newer is required; found ${version}`);
          }
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frozen release verification
        run: |
          pnpm format:check
          pnpm --filter @nicia-ai/lachesis build
          pnpm --filter @nicia-ai/lachesis-evidence build
          pnpm --filter @nicia-ai/lachesis-generator build
          pnpm --filter @nicia-ai/lachesis-runtime build
          pnpm --filter @nicia-ai/lachesis-evidence-typegraph build
          pnpm --filter @nicia-ai/lachesis-cli build
          pnpm build
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm test:coverage
          pnpm build
          pnpm smoke
          pnpm test:examples
          pnpm test:load
          pnpm audit:source-safety
          pnpm audit:public-api
          pnpm audit:release-checksums
          node scripts/audit-historical-checksum.mjs \
            5b2150c9dce49f67531589d81d186b941199c19e \
            docs/m8b2a-results.sha256 \
            b4ab2e772922c3091d3c52c7451596dd86f4595b4e4eb7885720507a7b50aff6
          mkdir -p "$RUNNER_TEMP/lachesis-pack-audit-prefetch"
          cat > "$RUNNER_TEMP/lachesis-pack-audit-prefetch/package.json" <<'EOF'
          {
            "name": "lachesis-pack-audit-prefetch",
            "private": true,
            "packageManager": "pnpm@10.33.0",
            "dependencies": {
              "@babel/parser": "7.29.7",
              "@babel/types": "7.29.7",
              "@nicia-ai/typegraph": "0.38.0",
              "@types/node": "24.13.3",
              "better-sqlite3": "12.11.1",
              "typescript": "6.0.3",
              "wrangler": "4.110.0",
              "zod": "4.4.3"
            }
          }
          EOF
          pnpm --dir "$RUNNER_TEMP/lachesis-pack-audit-prefetch" install \
            --ignore-scripts \
            --lockfile=false
          pnpm audit:packages

      - name: Verify authorized package set
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const expected = new Map([
            ["packages/kernel/package.json", "@nicia-ai/lachesis"],
            ["packages/evidence/package.json", "@nicia-ai/lachesis-evidence"],
            ["packages/runtime/package.json", "@nicia-ai/lachesis-runtime"],
            ["packages/evidence-typegraph/package.json", "@nicia-ai/lachesis-evidence-typegraph"],
            ["packages/generator/package.json", "@nicia-ai/lachesis-generator"],
            ["apps/cli/package.json", "@nicia-ai/lachesis-cli"],
          ]);
          const publicPackages = new Map();
          for (const root of ["packages", "apps", "compat", "examples"]) {
            if (!fs.existsSync(root)) continue;
            for (const entry of fs.readdirSync(root)) {
              const manifestPath = path.join(root, entry, "package.json");
              if (!fs.existsSync(manifestPath)) continue;
              const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
              if (manifest.private !== true) publicPackages.set(manifestPath, manifest);
            }
          }
          if (publicPackages.size !== expected.size) {
            throw new Error(`Expected exactly ${expected.size} public packages; found ${publicPackages.size}`);
          }
          for (const [manifestPath, expectedName] of expected) {
            const manifest = publicPackages.get(manifestPath);
            if (
              manifest?.name !== expectedName ||
              manifest.version !== process.env.RELEASE_VERSION ||
              manifest.publishConfig?.access !== "public"
            ) {
              throw new Error(`Unauthorized package metadata at ${manifestPath}`);
            }
            for (const [dependency, version] of Object.entries(manifest.dependencies ?? {})) {
              if (dependency.startsWith("@nicia-ai/lachesis") && version !== process.env.RELEASE_VERSION) {
                throw new Error(`${manifest.name} has an unsynchronized dependency on ${dependency}`);
              }
            }
          }
          const cli = publicPackages.get("apps/cli/package.json");
          if (
            cli?.private !== false ||
            cli.type !== "module" ||
            cli.engines?.node !== ">=24 <25" ||
            cli.bin?.lachesis !== "./dist/cli.js" ||
            cli.exports !== undefined ||
            cli.main !== undefined ||
            cli.types !== undefined
          ) {
            throw new Error("CLI binary-only metadata is not frozen.");
          }
          NODE

      - name: Check registry state
        id: registry
        run: |
          present=0
          absent=0
          for package_name in \
            @nicia-ai/lachesis \
            @nicia-ai/lachesis-evidence \
            @nicia-ai/lachesis-runtime \
            @nicia-ai/lachesis-evidence-typegraph \
            @nicia-ai/lachesis-generator
          do
            if npm view "$package_name@$RELEASE_VERSION" version >/dev/null 2>&1
            then
              present=$((present + 1))
            else
              absent=$((absent + 1))
            fi
          done
          cli_present=false
          if npm view "@nicia-ai/lachesis-cli@$RELEASE_VERSION" version >/dev/null 2>&1
          then
            cli_present=true
          fi
          if test "$present" -eq 0 && test "$cli_present" = "true"
          then
            echo "state=cli-bootstrap-present" >> "$GITHUB_OUTPUT"
          elif test "$absent" -eq 0 && test "$cli_present" = "true"
          then
            echo "state=present" >> "$GITHUB_OUTPUT"
          elif test "$present" -eq 0 && test "$cli_present" = "false"
          then
            echo "The separately authorized CLI bootstrap must complete before this workflow." >&2
            exit 1
          else
            echo "Refusing an unexpected partial release: $present existing-package versions, CLI present=$cli_present" >&2
            exit 1
          fi

      - name: Snapshot existing latest dist-tags
        run: |
          latest_snapshot="$RUNNER_TEMP/latest-dist-tags.tsv"
          : > "$latest_snapshot"
          for package_name in \
            @nicia-ai/lachesis \
            @nicia-ai/lachesis-evidence \
            @nicia-ai/lachesis-runtime \
            @nicia-ai/lachesis-evidence-typegraph \
            @nicia-ai/lachesis-generator
          do
            latest="$(npm view "$package_name" dist-tags.latest 2>/dev/null || true)"
            test "$latest" = "0.1.0-alpha.1"
            printf '%s\t%s\n' "$package_name" "$latest" >> "$latest_snapshot"
          done
          cli_latest="$(npm view @nicia-ai/lachesis-cli dist-tags.latest 2>/dev/null || true)"
          test -z "$cli_latest" || test "$cli_latest" = "$RELEASE_VERSION"
          printf '%s\t%s\n' "@nicia-ai/lachesis-cli" "$cli_latest" >> "$latest_snapshot"

      - name: Pack audited artifacts
        run: |
          node scripts/prepare-alpha4-tarballs.mjs --output-dir .release-packages
          (
            cd .release-packages
            shasum -a 256 -c ../docs/m8b2b-alpha4-tarballs.sha256
          )

      - name: Publish public alpha
        if: steps.registry.outputs.state == 'cli-bootstrap-present'
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          npm publish ".release-packages/nicia-ai-lachesis-$RELEASE_VERSION.tgz" --tag alpha --access public
          npm publish ".release-packages/nicia-ai-lachesis-evidence-$RELEASE_VERSION.tgz" --tag alpha --access public
          npm publish ".release-packages/nicia-ai-lachesis-runtime-$RELEASE_VERSION.tgz" --tag alpha --access public
          npm publish ".release-packages/nicia-ai-lachesis-evidence-typegraph-$RELEASE_VERSION.tgz" --tag alpha --access public
          npm publish ".release-packages/nicia-ai-lachesis-generator-$RELEASE_VERSION.tgz" --tag alpha --access public

      - name: Verify alpha dist-tags
        run: |
          latest_snapshot="$RUNNER_TEMP/latest-dist-tags.tsv"
          for package_name in \
            @nicia-ai/lachesis \
            @nicia-ai/lachesis-evidence \
            @nicia-ai/lachesis-runtime \
            @nicia-ai/lachesis-evidence-typegraph \
            @nicia-ai/lachesis-generator \
            @nicia-ai/lachesis-cli
          do
            published=false
            for attempt in $(seq 1 24)
            do
              version="$(npm view "$package_name@$RELEASE_VERSION" version 2>/dev/null || true)"
              alpha="$(npm view "$package_name" dist-tags.alpha 2>/dev/null || true)"
              if test "$version" = "$RELEASE_VERSION" && test "$alpha" = "$RELEASE_VERSION"
              then
                published=true
                break
              fi
              echo "Waiting for $package_name registry visibility ($attempt/24)" >&2
              sleep 5
            done
            test "$published" = "true"
            latest="$(npm view "$package_name" dist-tags.latest 2>/dev/null || true)"
            expected_latest="$(awk -F '\t' -v name="$package_name" '$1 == name { print $2 }' "$latest_snapshot")"
            test "$latest" = "$expected_latest"
          done

      - name: Verify registry tarballs, signatures, provenance, and consumer
        run: |
          registry_root="$RUNNER_TEMP/lachesis-alpha4-registry"
          mkdir -p "$registry_root/tarballs" "$registry_root/consumer"
          for package_name in \
            @nicia-ai/lachesis \
            @nicia-ai/lachesis-evidence \
            @nicia-ai/lachesis-runtime \
            @nicia-ai/lachesis-evidence-typegraph \
            @nicia-ai/lachesis-generator \
            @nicia-ai/lachesis-cli
          do
            npm pack "$package_name@$RELEASE_VERSION" \
              --pack-destination "$registry_root/tarballs"
          done
          (
            cd "$registry_root/tarballs"
            shasum -a 256 -c "$GITHUB_WORKSPACE/docs/m8b2b-alpha4-tarballs.sha256"
          )
          cat > "$registry_root/consumer/package.json" <<EOF
          {
            "name": "lachesis-alpha4-registry-consumer",
            "private": true,
            "type": "module",
            "dependencies": {
              "@nicia-ai/lachesis": "$RELEASE_VERSION",
              "@nicia-ai/lachesis-cli": "$RELEASE_VERSION",
              "@nicia-ai/lachesis-evidence": "$RELEASE_VERSION",
              "@nicia-ai/lachesis-evidence-typegraph": "$RELEASE_VERSION",
              "@nicia-ai/lachesis-generator": "$RELEASE_VERSION",
              "@nicia-ai/lachesis-runtime": "$RELEASE_VERSION",
              "zod": "4.4.3"
            },
            "devDependencies": {
              "@types/node": "24.13.3",
              "typescript": "6.0.3"
            }
          }
          EOF
          cat > "$registry_root/consumer/consumer.ts" <<'EOF'
          import { canonicalizeJson } from "@nicia-ai/lachesis";
          import type { CatalogConformanceSuite } from "@nicia-ai/lachesis-generator";
          import type { RuntimeResult } from "@nicia-ai/lachesis-runtime";

          const canonical = canonicalizeJson({ alpha: 4 });
          export type RegistrySmoke = readonly [
            string,
            CatalogConformanceSuite,
            RuntimeResult,
          ];
          void canonical;
          EOF
          cat > "$registry_root/consumer/tsconfig.json" <<'EOF'
          {
            "compilerOptions": {
              "module": "NodeNext",
              "moduleResolution": "NodeNext",
              "target": "ES2024",
              "strict": true,
              "skipLibCheck": false,
              "noEmit": true
            },
            "files": ["consumer.ts"]
          }
          EOF
          npm --prefix "$registry_root/consumer" install --ignore-scripts
          npm --prefix "$registry_root/consumer" exec -- tsc --noEmit
          set +e
          "$registry_root/consumer/node_modules/.bin/lachesis" >/dev/null 2>&1
          cli_status="$?"
          set -e
          test "$cli_status" -eq 64
          (
            cd "$registry_root/consumer"
            npm audit signatures
          )

      - name: Return release to draft on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"
          --draft=true
