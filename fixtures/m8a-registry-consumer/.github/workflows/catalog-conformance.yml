name: Catalog conformance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run verify
      - run: npm run workers:dry-run
      - name: Reject unsafe evolution
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";
          const report = JSON.parse(
            await readFile("reports/m8a-adoption-report.json", "utf8"),
          );
          if (!report.gates.deterministicConformance) process.exit(1);
          if (
            report.evolution.genuinelyNonEquivalent.action.kind !==
            "do-not-substitute"
          ) process.exit(1);
          NODE
